{% extends "base.html" %}

{% block title %}Edit Employee{% endblock %}
{% block page_title %}Edit Employee{% endblock %}

{% block content %}

<div class="form-page">
    <div class="form-card">
        <div class="form-card-header">
            <h2>Edit Employee</h2>
            <p>Update employee information for {{ employee.name }}</p>
        </div>

        <form action="{{ url_for('edit_employee', id=employee.id) }}" method="POST" data-validate>

            <div class="form-grid">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" value="{{ employee.name }}" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ employee.email }}" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" value="{{ employee.phone }}" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department" value="{{ employee.department }}" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Position</label>
                    <input type="text" name="position" value="{{ employee.position }}" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Salary</label>
                    <input type="number" name="salary" value="{{ employee.salary }}" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group full-width">
                    <label>Address</label>
                    <textarea name="address" rows="4">{{ employee.address }}</textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Update Employee
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
