{% extends "base.html" %}

{% block title %}Add Employee{% endblock %}
{% block page_title %}Add Employee{% endblock %}

{% block content %}

<div class="form-page">
    <div class="form-card">
        <div class="form-card-header">
            <h2>Add New Employee</h2>
            <p>Create a new employee account with their details</p>
        </div>

        <form action="{{ url_for('add_employee') }}" method="POST" data-validate>

            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter full name" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter email address" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" placeholder="Enter phone number" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department" placeholder="Enter department" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Position</label>
                    <input type="text" name="position" placeholder="Enter position" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group">
                    <label>Salary</label>
                    <input type="number" name="salary" placeholder="Enter salary" required>
                    <div class="input-error"></div>
                </div>

                <div class="form-group full-width">
                    <label>Address</label>
                    <textarea name="address" rows="4" placeholder="Enter address"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    Add Employee
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
